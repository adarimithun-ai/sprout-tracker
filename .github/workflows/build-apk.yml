name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. Build signed APK ──────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode keystore from secret (if set)
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apk-build/android.keystore
            echo "Using keystore from secret."
          else
            echo "KEYSTORE_BASE64 secret not set — using committed keystore (password: android)."
          fi

      - name: Make gradlew executable
        run: chmod +x apk-build/gradlew

      - name: Build release APK
        working-directory: apk-build
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/apk-build/android.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate built APK
        id: find_apk
        run: |
          APK=$(find apk-build/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          cp "$APK" sprout-v3.apk
          echo "APK ready: $APK"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprout-v3-apk
          path: sprout-v3.apk
          retention-days: 60

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.${{ github.run_number }}
          name: "Sprout v3 — 10 new features"
          body: |
            ## What's new in v3
            - Head circumference tracking with WHO benchmarks
            - Date of birth — auto-calculates current age and vaccine due dates
            - Export / Import all data as JSON backup
            - Growth entry date and notes per record
            - Vaccine due date alerts with real calendar dates
            - Milestone confetti celebration animation
            - Height unit toggle (cm / ft)
            - 5th stat card for head circumference

            **How to install:** Download `sprout-v3.apk` below, transfer to your Android phone, enable "Install from unknown sources" in settings, and tap the file.
          files: sprout-v3.apk
          draft: false
          prerelease: false
